{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="space-y-6" x-data="hybridBotApp()">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-white">Hybrid Trading Bot</h1>
            <p class="text-gray-400 mt-1">Kalshi AI Ensemble Trader</p>
        </div>
        <div class="flex items-center space-x-4">
            {% if paper_mode %}
            <span class="px-3 py-1 text-sm font-semibold bg-yellow-600 text-yellow-100 rounded-full">
                PAPER MODE
            </span>
            {% endif %}

            <!-- Bot Status Indicator -->
            <div class="flex items-center space-x-2 px-3 py-1.5 bg-gray-800 rounded-lg border border-gray-700">
                <div
                    class="w-2.5 h-2.5 rounded-full"
                    :class="botPaused ? 'bg-yellow-500' : (botRunning ? 'bg-green-500 animate-pulse' : 'bg-gray-500')"
                ></div>
                <span class="text-sm font-medium" :class="{
                    'text-green-400': !botPaused && botRunning,
                    'text-yellow-400': botPaused,
                    'text-gray-400': !botPaused && !botRunning
                }" x-text="botPaused ? 'Paused' : (botRunning ? 'Active' : 'Stopped')"></span>
            </div>

            <!-- Pause/Resume Button -->
            <button
                @click="toggleBot()"
                :disabled="isToggling"
                class="px-4 py-2 rounded-lg font-medium transition-colors flex items-center space-x-2 disabled:opacity-50"
                :class="botPaused ?
                    'bg-green-600 hover:bg-green-700 text-white' :
                    'bg-yellow-600 hover:bg-yellow-700 text-white'"
            >
                <template x-if="!botPaused">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                    </svg>
                </template>
                <template x-if="botPaused">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </template>
                <span x-text="botPaused ? 'Resume Trading' : 'Pause Trading'"></span>
            </button>
        </div>
    </div>

    <!-- Status Bar -->
    <div
        hx-get="/hybrid/partials/status"
        hx-trigger="load, every 10s"
        hx-swap="innerHTML"
        class="bg-gray-800 rounded-lg p-4 border border-gray-700"
    >
        <div class="animate-pulse flex space-x-4">
            <div class="h-4 bg-gray-700 rounded w-1/4"></div>
            <div class="h-4 bg-gray-700 rounded w-1/4"></div>
            <div class="h-4 bg-gray-700 rounded w-1/4"></div>
        </div>
    </div>

    <!-- Main Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Portfolio Summary -->
        <div class="lg:col-span-2">
            <div
                hx-get="/hybrid/partials/portfolio"
                hx-trigger="load, every 30s"
                hx-swap="innerHTML"
                class="bg-gray-800 rounded-lg p-6 border border-gray-700 min-h-[200px]"
            >
                <div class="animate-pulse space-y-4">
                    <div class="h-6 bg-gray-700 rounded w-1/3"></div>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="h-16 bg-gray-700 rounded"></div>
                        <div class="h-16 bg-gray-700 rounded"></div>
                        <div class="h-16 bg-gray-700 rounded"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Strategy Allocation -->
        <div>
            <div
                hx-get="/hybrid/partials/strategy-allocation"
                hx-trigger="load"
                hx-swap="innerHTML"
                class="bg-gray-800 rounded-lg p-6 border border-gray-700 min-h-[200px]"
            >
                <div class="animate-pulse space-y-4">
                    <div class="h-6 bg-gray-700 rounded w-1/2"></div>
                    <div class="space-y-2">
                        <div class="h-8 bg-gray-700 rounded"></div>
                        <div class="h-8 bg-gray-700 rounded"></div>
                        <div class="h-8 bg-gray-700 rounded"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Positions Table -->
    <div class="bg-gray-800 rounded-lg border border-gray-700">
        <div class="p-4 border-b border-gray-700 flex justify-between items-center">
            <h2 class="text-lg font-semibold text-white">Open Positions</h2>
            <a href="/hybrid/positions" class="text-sm text-blue-400 hover:text-blue-300">
                View All
            </a>
        </div>
        <div
            hx-get="/hybrid/partials/positions"
            hx-trigger="load, every 30s"
            hx-swap="innerHTML"
            class="p-4"
        >
            <div class="animate-pulse space-y-3">
                <div class="h-12 bg-gray-700 rounded"></div>
                <div class="h-12 bg-gray-700 rounded"></div>
            </div>
        </div>
    </div>

    <!-- Recent Trades -->
    <div class="bg-gray-800 rounded-lg border border-gray-700">
        <div class="p-4 border-b border-gray-700 flex justify-between items-center">
            <h2 class="text-lg font-semibold text-white">Recent Trades</h2>
            <a href="/hybrid/history" class="text-sm text-blue-400 hover:text-blue-300">
                View History
            </a>
        </div>
        <div
            hx-get="/hybrid/partials/recent-trades"
            hx-trigger="load, every 60s"
            hx-swap="innerHTML"
            class="p-4"
        >
            <div class="animate-pulse space-y-3">
                <div class="h-10 bg-gray-700 rounded"></div>
                <div class="h-10 bg-gray-700 rounded"></div>
            </div>
        </div>
    </div>
</div>

<script>
function hybridBotApp() {
    return {
        botRunning: false,
        botPaused: false,
        isToggling: false,

        init() {
            this.fetchStatus();
            // Poll status every 10 seconds
            setInterval(() => this.fetchStatus(), 10000);
        },

        async fetchStatus() {
            try {
                const response = await fetch('/hybrid/api/status');
                const data = await response.json();
                if (data.success) {
                    this.botRunning = data.is_running;
                    this.botPaused = data.is_paused;
                }
            } catch (error) {
                console.error('Failed to fetch bot status:', error);
            }
        },

        async toggleBot() {
            if (this.isToggling) return;
            this.isToggling = true;

            try {
                const response = await fetch('/hybrid/api/toggle-trading', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });
                const data = await response.json();
                if (data.success) {
                    this.botPaused = data.is_paused;
                }
            } catch (error) {
                console.error('Failed to toggle bot:', error);
            }

            this.isToggling = false;
        }
    };
}
</script>
{% endblock %}
