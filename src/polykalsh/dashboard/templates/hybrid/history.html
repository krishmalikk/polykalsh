{% extends "base.html" %}

{% block title %}{{ title }} - Hybrid Bot{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-white">Trade History</h1>
            <p class="text-gray-400 mt-1">View past trades and performance</p>
        </div>
        <a href="/hybrid" class="text-blue-400 hover:text-blue-300">
            &larr; Back to Dashboard
        </a>
    </div>

    <!-- Filters -->
    <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
        <div class="flex flex-wrap gap-4">
            <select class="bg-gray-700 text-white rounded-md px-3 py-2 text-sm">
                <option value="">All Strategies</option>
                <option value="directional">Directional</option>
                <option value="market_making">Market Making</option>
            </select>
            <select class="bg-gray-700 text-white rounded-md px-3 py-2 text-sm">
                <option value="">All Outcomes</option>
                <option value="profit">Profit</option>
                <option value="loss">Loss</option>
            </select>
            <select class="bg-gray-700 text-white rounded-md px-3 py-2 text-sm">
                <option value="7">Last 7 days</option>
                <option value="30">Last 30 days</option>
                <option value="90">Last 90 days</option>
                <option value="">All time</option>
            </select>
        </div>
    </div>

    <!-- Trades List -->
    <div class="bg-gray-800 rounded-lg border border-gray-700">
        <div
            hx-get="/hybrid/partials/recent-trades"
            hx-trigger="load"
            hx-swap="innerHTML"
            class="p-4"
        >
            <div class="animate-pulse space-y-3">
                <div class="h-16 bg-gray-700 rounded"></div>
                <div class="h-16 bg-gray-700 rounded"></div>
                <div class="h-16 bg-gray-700 rounded"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
