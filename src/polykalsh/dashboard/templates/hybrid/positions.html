{% extends "base.html" %}

{% block title %}{{ title }} - Hybrid Bot{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-white">Open Positions</h1>
            <p class="text-gray-400 mt-1">Manage your active positions</p>
        </div>
        <a href="/hybrid" class="text-blue-400 hover:text-blue-300">
            &larr; Back to Dashboard
        </a>
    </div>

    <!-- Positions Table -->
    <div class="bg-gray-800 rounded-lg border border-gray-700">
        <div
            hx-get="/hybrid/partials/positions"
            hx-trigger="load, every 15s"
            hx-swap="innerHTML"
            class="p-4"
        >
            <div class="animate-pulse space-y-3">
                <div class="h-12 bg-gray-700 rounded"></div>
                <div class="h-12 bg-gray-700 rounded"></div>
                <div class="h-12 bg-gray-700 rounded"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
