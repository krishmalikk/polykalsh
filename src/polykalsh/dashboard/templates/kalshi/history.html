{% extends "base.html" %}

{% block title %}{{ title }} - Kalshi Bot{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
            <div class="flex items-center space-x-3 mb-2">
                <a href="/kalshi" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </a>
                <h1 class="text-3xl font-bold text-white">Trade History</h1>
            </div>
            <p class="text-gray-400">View your past trades and performance</p>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-gray-800/50 rounded-xl border border-gray-700/50 p-4">
        <div class="flex flex-wrap gap-4">
            <select class="bg-gray-900 text-white rounded-lg px-4 py-2 text-sm border border-gray-700 focus:border-purple-500 focus:outline-none">
                <option value="">All Strategies</option>
                <option value="directional">Directional</option>
                <option value="market_making">Market Making</option>
                <option value="arbitrage">Arbitrage</option>
            </select>
            <select class="bg-gray-900 text-white rounded-lg px-4 py-2 text-sm border border-gray-700 focus:border-purple-500 focus:outline-none">
                <option value="">All Outcomes</option>
                <option value="profit">Profit</option>
                <option value="loss">Loss</option>
            </select>
            <select class="bg-gray-900 text-white rounded-lg px-4 py-2 text-sm border border-gray-700 focus:border-purple-500 focus:outline-none">
                <option value="7">Last 7 days</option>
                <option value="30">Last 30 days</option>
                <option value="90">Last 90 days</option>
                <option value="">All time</option>
            </select>
        </div>
    </div>

    <!-- Trades List -->
    <div class="bg-gray-800/50 rounded-2xl border border-gray-700/50">
        <div
            class="p-6"
            hx-get="/kalshi/partials/recent-trades"
            hx-trigger="load"
            hx-swap="innerHTML"
        >
            <div class="animate-pulse space-y-3">
                <div class="h-16 bg-gray-700 rounded"></div>
                <div class="h-16 bg-gray-700 rounded"></div>
                <div class="h-16 bg-gray-700 rounded"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
