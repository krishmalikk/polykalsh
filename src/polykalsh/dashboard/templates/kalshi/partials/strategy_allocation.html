<h2 class="text-lg font-semibold text-white mb-6">Strategy Allocation</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Directional -->
    <div class="bg-gray-900/50 rounded-xl p-6">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                    <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                    </svg>
                </div>
                <div>
                    <p class="text-white font-semibold">Directional</p>
                    <p class="text-xs text-gray-500">AI-predicted edge trades</p>
                </div>
            </div>
            <p class="text-2xl font-bold text-purple-400">{{ "%.0f"|format(allocation.directional) }}%</p>
        </div>
        <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
            <div class="h-full bg-purple-500 rounded-full transition-all" style="width: {{ allocation.directional }}%"></div>
        </div>
    </div>

    <!-- Market Making -->
    <div class="bg-gray-900/50 rounded-xl p-6">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                    </svg>
                </div>
                <div>
                    <p class="text-white font-semibold">Market Making</p>
                    <p class="text-xs text-gray-500">Bid-ask spread capture</p>
                </div>
            </div>
            <p class="text-2xl font-bold text-blue-400">{{ "%.0f"|format(allocation.market_making) }}%</p>
        </div>
        <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
            <div class="h-full bg-blue-500 rounded-full transition-all" style="width: {{ allocation.market_making }}%"></div>
        </div>
    </div>

    <!-- Arbitrage -->
    <div class="bg-gray-900/50 rounded-xl p-6">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-lg bg-green-500/20 flex items-center justify-center">
                    <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </div>
                <div>
                    <p class="text-white font-semibold">Arbitrage</p>
                    <p class="text-xs text-gray-500">Cross-market mispricing</p>
                </div>
            </div>
            <p class="text-2xl font-bold text-green-400">{{ "%.0f"|format(allocation.arbitrage) }}%</p>
        </div>
        <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
            <div class="h-full bg-green-500 rounded-full transition-all" style="width: {{ allocation.arbitrage }}%"></div>
        </div>
    </div>
</div>
