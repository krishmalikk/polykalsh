{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="space-y-8">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
            <div class="flex items-center space-x-3 mb-2">
                <div class="w-10 h-10 rounded-xl gradient-kalshi flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-white">Kalshi AI Bot</h1>
            </div>
            <p class="text-gray-400">Multi-model AI ensemble trading on Kalshi prediction markets</p>
        </div>
        <div class="flex items-center space-x-3">
            <a href="/kalshi/positions" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-lg transition-colors">
                Positions
            </a>
            <a href="/kalshi/history" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-lg transition-colors">
                History
            </a>
            <a href="/kalshi/settings" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-lg transition-colors">
                Settings
            </a>
        </div>
    </div>

    <!-- Status + Portfolio Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Status Card -->
        <div
            class="bg-gray-800/50 rounded-2xl border border-gray-700/50 p-6"
            hx-get="/kalshi/partials/status"
            hx-trigger="load, every 10s"
            hx-swap="innerHTML"
        >
            <div class="animate-pulse space-y-4">
                <div class="h-6 w-24 bg-gray-700 rounded"></div>
                <div class="h-20 bg-gray-700 rounded"></div>
            </div>
        </div>

        <!-- Portfolio Card -->
        <div
            class="lg:col-span-2 bg-gray-800/50 rounded-2xl border border-gray-700/50 p-6"
            hx-get="/kalshi/partials/portfolio"
            hx-trigger="load, every 15s"
            hx-swap="innerHTML"
        >
            <div class="animate-pulse space-y-4">
                <div class="h-6 w-32 bg-gray-700 rounded"></div>
                <div class="grid grid-cols-4 gap-4">
                    <div class="h-20 bg-gray-700 rounded"></div>
                    <div class="h-20 bg-gray-700 rounded"></div>
                    <div class="h-20 bg-gray-700 rounded"></div>
                    <div class="h-20 bg-gray-700 rounded"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Strategy Allocation -->
    <div
        class="bg-gray-800/50 rounded-2xl border border-gray-700/50 p-6"
        hx-get="/kalshi/partials/strategy-allocation"
        hx-trigger="load"
        hx-swap="innerHTML"
    >
        <div class="animate-pulse space-y-4">
            <div class="h-6 w-40 bg-gray-700 rounded"></div>
            <div class="h-32 bg-gray-700 rounded"></div>
        </div>
    </div>

    <!-- Positions + Recent Trades -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Open Positions -->
        <div class="bg-gray-800/50 rounded-2xl border border-gray-700/50 p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold text-white">Open Positions</h2>
                <a href="/kalshi/positions" class="text-sm text-purple-400 hover:text-purple-300">View All</a>
            </div>
            <div
                hx-get="/kalshi/partials/positions"
                hx-trigger="load, every 15s"
                hx-swap="innerHTML"
            >
                <div class="animate-pulse space-y-3">
                    <div class="h-16 bg-gray-700 rounded"></div>
                    <div class="h-16 bg-gray-700 rounded"></div>
                </div>
            </div>
        </div>

        <!-- Recent Trades -->
        <div class="bg-gray-800/50 rounded-2xl border border-gray-700/50 p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold text-white">Recent Trades</h2>
                <a href="/kalshi/history" class="text-sm text-purple-400 hover:text-purple-300">View All</a>
            </div>
            <div
                hx-get="/kalshi/partials/recent-trades"
                hx-trigger="load, every 30s"
                hx-swap="innerHTML"
            >
                <div class="animate-pulse space-y-3">
                    <div class="h-16 bg-gray-700 rounded"></div>
                    <div class="h-16 bg-gray-700 rounded"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
